  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Altio — Autonomous Exterior Maintenance · altioaem.com</title>
  <meta name="description" content="Drone-led facade, window, and gutter cleaning for luxury hotels, HOAs, and commercial properties on LA's westside. No scaffolding. No lifts. No one on the wall." />
  <meta name="theme-color" content="#05080C" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;500;600&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
/* ============================================
   ALTIO — Brand Identity Guidelines
   ============================================ */

:root {
  /* Surfaces — Obsidian (dark) by default */
  --ink:     #05080C;
  --ink-2:   #0B0F15;
  --ink-3:   #131923;
  --hairline: rgba(244, 241, 233, 0.08);
  --hairline-strong: rgba(244, 241, 233, 0.16);

  /* Text — Salt (warm white) */
  --salt:    #F4F1E9;
  --salt-2:  #B6B3AB;
  --salt-3:  #71706C;

  /* Brand — Cyan + Pacific (default) */
  --cyan:    #3D8CFF;   /* primary brand accent — sampled from wordmark */
  --cyan-2:  #6FA8FF;
  --pacific: #0F3FAA;
  --surf:    #7BD5E8;

  /* Signal — warm sunset coast */
  --signal:  #FF7A45;

  /* Neutrals */
  --concrete:#6B7178;
  --steel:   #9CA3AA;

  /* Type scale */
  --display: 'Sora', system-ui, sans-serif;
  --body:    'Geist', system-ui, sans-serif;
  --mono:    'Geist Mono', ui-monospace, monospace;

  /* Grid */
  --gutter: 32px;
  --maxw:   1280px;
}

/* Light mode — Salt surfaces */
[data-mode="light"] {
  --ink:     #F4F1E9;
  --ink-2:   #ECE8DD;
  --ink-3:   #E3DECF;
  --hairline: rgba(5, 8, 12, 0.10);
  --hairline-strong: rgba(5, 8, 12, 0.22);
  --salt:    #05080C;
  --salt-2:  #3A4049;
  --salt-3:  #6B7178;
}

/* Palette themes */
[data-palette="pacific"] {
  --cyan:    #1B5BD4;
  --cyan-2:  #4E83E6;
  --pacific: #082C7E;
  --surf:    #5BB4E0;
}
[data-palette="marine"] {
  --cyan:    #2DD4BF;
  --cyan-2:  #5EEAD4;
  --pacific: #0E7C70;
  --surf:    #A7F3D0;
}
[data-palette="solar"] {
  --cyan:    #FF7A45;
  --cyan-2:  #FFA275;
  --pacific: #B8431A;
  --surf:    #FFD6A8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--ink);
  color: var(--salt);
  font-family: var(--body);
  font-feature-settings: 'ss01', 'cv11';
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.5;
  transition: background-color 240ms ease, color 240ms ease;
}

::selection { background: var(--cyan); color: var(--ink); }

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }

/* ============================================
   Layout primitives
   ============================================ */

.section {
  position: relative;
  padding: 120px var(--gutter);
  border-top: 1px solid var(--hairline);
}
.section:first-of-type { border-top: none; }

.container {
  max-width: var(--maxw);
  margin: 0 auto;
}

.section-head {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 64px;
  margin-bottom: 64px;
  align-items: baseline;
}

.section-num {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.08em;
  color: var(--salt-3);
  text-transform: uppercase;
}
.section-num::before {
  content: '— ';
}

.section-title {
  font-family: var(--display);
  font-weight: 300;
  font-size: clamp(36px, 5vw, 72px);
  letter-spacing: -0.02em;
  line-height: 0.95;
}

.section-kicker {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 16px;
}

.eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--salt-3);
}

.lede {
  font-family: var(--display);
  font-weight: 300;
  font-size: clamp(22px, 2.4vw, 32px);
  line-height: 1.25;
  letter-spacing: -0.015em;
  max-width: 680px;
  color: var(--salt-2);
  text-wrap: balance;
}

/* ============================================
   Top frame / nav
   ============================================ */

.topframe {
  position: sticky;
  top: 0;
  z-index: 50;
  background: color-mix(in oklab, var(--ink) 92%, transparent);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--hairline);
}

.topframe-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--salt-2);
}

.topframe-mark {
  display: flex;
  align-items: center;
  gap: 10px;
}

.topframe nav {
  display: flex;
  gap: 28px;
}
.topframe nav a {
  color: var(--salt-3);
  transition: color 160ms;
}
.topframe nav a:hover { color: var(--salt); }
.topframe nav a.is-active { color: var(--salt); }

/* ============================================
   Hero
   ============================================ */

.hero {
  min-height: 100vh;
  display: grid;
  grid-template-rows: 1fr auto;
  padding: 120px var(--gutter) 48px;
  position: relative;
  overflow: hidden;
}

.hero-grid {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.5;
  background-image:
    linear-gradient(to right, var(--hairline) 1px, transparent 1px),
    linear-gradient(to bottom, var(--hairline) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(ellipse at 65% 30%, rgba(0,0,0,0.85), transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse at 65% 30%, rgba(0,0,0,0.85), transparent 70%);
}

.hero-content {
  display: grid;
  align-items: end;
  position: relative;
  z-index: 1;
}

.hero-wordmark {
  width: 100%;
  max-width: 1100px;
  margin: 0 auto;
}

.hero-meta {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 32px;
  padding-top: 48px;
  margin-top: 48px;
  border-top: 1px solid var(--hairline);
  position: relative;
  z-index: 1;
}

.hero-meta-cell .k {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--salt-3);
  margin-bottom: 10px;
  display: block;
}
.hero-meta-cell .v {
  font-family: var(--display);
  font-weight: 400;
  font-size: 18px;
  line-height: 1.35;
  color: var(--salt);
}

/* ============================================
   Logo system
   ============================================ */

.logo-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 24px;
}

.tile {
  position: relative;
  background: var(--ink-2);
  border: 1px solid var(--hairline);
  border-radius: 2px;
  padding: 48px;
  overflow: hidden;
}
.tile.invert {
  background: var(--salt);
  color: var(--ink);
}
.tile.cyan {
  background: var(--cyan);
  color: var(--ink);
}

.tile-label {
  position: absolute;
  top: 16px;
  left: 16px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--salt-3);
}
.tile.invert .tile-label,
.tile.cyan .tile-label { color: rgba(5,8,12,0.5); }

.tile-tag {
  position: absolute;
  top: 16px;
  right: 16px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--salt-3);
}
.tile.invert .tile-tag,
.tile.cyan .tile-tag { color: rgba(5,8,12,0.5); }

.tile-center {
  height: 320px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.construction-grid {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.4;
  background-image:
    linear-gradient(to right, var(--hairline) 1px, transparent 1px),
    linear-gradient(to bottom, var(--hairline) 1px, transparent 1px);
  background-size: 40px 40px;
}

.scale-strip {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 24px;
  margin-top: 24px;
}

.scale-cell {
  background: var(--ink-2);
  border: 1px solid var(--hairline);
  padding: 36px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  min-height: 160px;
}
.scale-cell .px {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--salt-3);
}

.dos-donts {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-top: 24px;
}
.donts-card {
  background: var(--ink-2);
  border: 1px solid var(--hairline);
  padding: 24px;
  min-height: 220px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.donts-card .badge {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--signal);
  display: flex;
  align-items: center;
  gap: 8px;
}
.donts-card .badge::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--signal);
  border-radius: 50%;
}
.donts-card .label {
  font-size: 13px;
  color: var(--salt-2);
  margin-top: auto;
}
.donts-card .preview {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 0;
}

/* ============================================
   Color
   ============================================ */

.swatch-stack {
  display: grid;
  gap: 4px;
}

.swatch-primary {
  height: 360px;
  padding: 32px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
}

.swatch-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
}
.swatch-row .swatch-cell {
  height: 180px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.swatch-name {
  font-family: var(--display);
  font-weight: 400;
  font-size: 28px;
  letter-spacing: -0.01em;
}
.swatch-primary .swatch-name { font-size: 56px; line-height: 0.9; }

.swatch-meta {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  line-height: 1.7;
}
.swatch-meta .row { display: flex; justify-content: space-between; gap: 16px; }
.swatch-meta .row span:first-child { opacity: 0.55; }

/* ============================================
   Type
   ============================================ */

.type-specimen {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 48px;
  padding: 48px 0;
  border-top: 1px solid var(--hairline);
}
.type-specimen:first-child { border-top: none; padding-top: 0; }

.type-meta {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.type-meta .family {
  font-family: var(--display);
  font-weight: 400;
  font-size: 24px;
  letter-spacing: -0.01em;
}
.type-meta .use {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--salt-3);
}
.type-meta .weights {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--salt-2);
  margin-top: 8px;
}

.type-sample-xl {
  font-family: var(--display);
  font-weight: 200;
  font-size: clamp(72px, 11vw, 168px);
  letter-spacing: -0.04em;
  line-height: 0.88;
  color: var(--salt);
}

.type-sample-body {
  font-family: var(--body);
  font-weight: 400;
  font-size: 19px;
  line-height: 1.55;
  color: var(--salt-2);
  max-width: 640px;
  text-wrap: pretty;
}

.type-sample-mono {
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 0.04em;
  line-height: 1.7;
  color: var(--salt-2);
}

.type-scale-row {
  display: flex;
  align-items: baseline;
  gap: 24px;
  padding: 14px 0;
  border-bottom: 1px solid var(--hairline);
}
.type-scale-row:last-child { border-bottom: none; }
.type-scale-row .lbl {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--salt-3);
  width: 80px;
  flex-shrink: 0;
}
.type-scale-row .px {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--salt-3);
  width: 60px;
  flex-shrink: 0;
}
.type-scale-row .specimen {
  font-family: var(--display);
  font-weight: 300;
  letter-spacing: -0.02em;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ============================================
   Voice
   ============================================ */

.voice-cols {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
}
.voice-cell {
  background: var(--ink-2);
  border: 1px solid var(--hairline);
  padding: 36px 32px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-height: 280px;
}
.voice-cell h4 {
  font-family: var(--display);
  font-weight: 400;
  font-size: 22px;
  letter-spacing: -0.01em;
}
.voice-cell .pos, .voice-cell .neg {
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.6;
  letter-spacing: 0.02em;
}
.voice-cell .pos::before {
  content: 'WE SAY';
  display: block;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--cyan);
  margin-bottom: 6px;
}
.voice-cell .neg::before {
  content: 'WE DON\'T';
  display: block;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--salt-3);
  margin-bottom: 6px;
}
.voice-cell .neg { color: var(--salt-3); text-decoration: line-through; text-decoration-thickness: 1px; text-decoration-color: var(--hairline-strong); }

.tagline-stack {
  display: grid;
  gap: 4px;
  margin-top: 24px;
}
.tagline-row {
  background: var(--ink-2);
  border: 1px solid var(--hairline);
  padding: 28px 32px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 32px;
}
.tagline-row .copy {
  font-family: var(--display);
  font-weight: 300;
  font-size: clamp(22px, 2.4vw, 32px);
  letter-spacing: -0.015em;
}
.tagline-row .ctx {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--salt-3);
  flex-shrink: 0;
}

/* ============================================
   Pattern / motion
   ============================================ */

.pattern-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
}
.pattern-cell {
  aspect-ratio: 1;
  background: var(--ink-2);
  border: 1px solid var(--hairline);
  position: relative;
  overflow: hidden;
}
.pattern-cell .pattern-label {
  position: absolute;
  bottom: 16px;
  left: 16px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--salt-3);
  z-index: 2;
}

/* ============================================
   Applications
   ============================================ */

.app-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 4px;
}
.app-grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  margin-top: 4px;
}
.app-tile {
  background: var(--ink-2);
  border: 1px solid var(--hairline);
  aspect-ratio: 16 / 10;
  position: relative;
  overflow: hidden;
}
.app-tile.tall { aspect-ratio: 4 / 5; }
.app-tile.wide { aspect-ratio: 21 / 9; }
.app-tile.square { aspect-ratio: 1; }

.app-tile .tile-label, .app-tile .tile-tag { z-index: 3; }

/* Cybertruck tile */
.cyber-tile {
  background: linear-gradient(180deg, #0a0f15 0%, #1a2230 100%);
}

/* Card mockup */
.card-mock {
  width: 64%;
  aspect-ratio: 1.586 / 1;   /* CR80 card ratio */
  background: var(--ink);
  border: 1px solid var(--hairline-strong);
  border-radius: 12px;
  padding: 22px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: absolute;
  left: 18%;
  top: 50%;
  transform: translateY(-50%) rotate(-4deg);
  box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
}
.card-mock .top-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.card-mock .name {
  font-family: var(--display);
  font-weight: 500;
  font-size: 14px;
}
.card-mock .title {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--salt-3);
  margin-top: 4px;
}
.card-mock .contact {
  font-family: var(--mono);
  font-size: 9px;
  line-height: 1.7;
  color: var(--salt-2);
}

/* Drone livery */
.drone-tile {
  background: radial-gradient(ellipse at 50% 100%, rgba(61,140,255,0.15), transparent 60%), var(--ink-2);
}

/* Web hero mock */
.web-mock {
  background: var(--ink);
  position: relative;
  overflow: hidden;
}
.web-mock .browser-bar {
  height: 28px;
  background: var(--ink-3);
  border-bottom: 1px solid var(--hairline);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
}
.web-mock .browser-bar .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--hairline-strong);
}
.web-mock .browser-bar .url {
  margin-left: 16px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--salt-3);
  background: var(--ink-2);
  padding: 3px 12px;
  border-radius: 4px;
}

/* IG post */
.ig-tile {
  background: var(--cyan);
  color: var(--ink);
}
.ig-tile .tile-label,
.ig-tile .tile-tag { color: rgba(5,8,12,0.6); }

/* ============================================
   Specs
   ============================================ */

.specs-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
}
.spec-cell {
  background: var(--ink-2);
  border: 1px solid var(--hairline);
  padding: 36px 28px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 220px;
}
.spec-cell .k {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--salt-3);
}
.spec-cell .v {
  font-family: var(--display);
  font-weight: 200;
  font-size: 56px;
  letter-spacing: -0.03em;
  line-height: 0.95;
  color: var(--salt);
}
.spec-cell .v .u {
  font-family: var(--mono);
  font-weight: 400;
  font-size: 13px;
  letter-spacing: 0.06em;
  color: var(--cyan);
  vertical-align: 18px;
  margin-left: 4px;
}
.spec-cell .lbl {
  font-family: var(--body);
  font-size: 13px;
  color: var(--salt-2);
}

/* ============================================
   Footer
   ============================================ */

.brand-footer {
  padding: 80px var(--gutter) 48px;
  border-top: 1px solid var(--hairline);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: end;
}
.brand-footer .colophon {
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.8;
  color: var(--salt-3);
  letter-spacing: 0.04em;
}
.brand-footer .colophon strong { color: var(--salt); font-weight: 500; }
.brand-footer .footer-mark {
  display: flex;
  justify-content: flex-end;
  align-items: center;
}

/* ============================================
   Misc
   ============================================ */

.hr-mono {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--salt-3);
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 32px;
}
.hr-mono::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--hairline);
}

@media (max-width: 900px) {
  .section-head { grid-template-columns: 1fr; gap: 16px; }
  .logo-grid, .voice-cols, .app-grid, .app-grid-3, .swatch-row, .specs-grid, .pattern-grid, .scale-strip, .dos-donts {
    grid-template-columns: 1fr 1fr;
  }
  .brand-footer { grid-template-columns: 1fr; }
  .hero-meta { grid-template-columns: 1fr 1fr; }
  .type-specimen { grid-template-columns: 1fr; gap: 16px; }
  .topframe nav { display: none; }
}

/* ============================================
   ALTIO — altioaem.com
   Site styles. Reuses brand tokens from styles.css.
   ============================================ */

:root {
  --site-maxw: 1320px;
  --site-gutter: 40px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

html, body {
  background: var(--ink);
  color: var(--salt);
  font-family: var(--body);
  font-feature-settings: 'ss01', 'cv11';
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.5;
}

::selection { background: var(--cyan); color: var(--ink); }

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
img { display: block; max-width: 100%; }

.wrap {
  max-width: var(--site-maxw);
  margin: 0 auto;
  padding: 0 var(--site-gutter);
}

.eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--cyan);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: '';
  width: 6px;
  height: 6px;
  background: var(--cyan);
  border-radius: 50%;
}

.muted {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--salt-3);
}

/* ============================================
   Nav
   ============================================ */

.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: color-mix(in oklab, var(--ink) 88%, transparent);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-bottom: 1px solid var(--hairline);
  transition: border-color 220ms ease;
}
.nav.is-scrolled { border-bottom-color: var(--hairline-strong); }

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px var(--site-gutter);
  max-width: var(--site-maxw);
  margin: 0 auto;
}

.nav-mark {
  display: flex;
  align-items: center;
  gap: 12px;
}
.nav-mark .mark-wm { width: 80px; }

.nav-links {
  display: flex;
  gap: 32px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--salt-2);
}
.nav-links a { transition: color 160ms; }
.nav-links a:hover { color: var(--salt); }

.nav-right {
  display: flex;
  align-items: center;
  gap: 20px;
}

.btn {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 12px 20px;
  border: 1px solid var(--hairline-strong);
  background: transparent;
  color: var(--salt);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 200ms ease;
  border-radius: 2px;
}
.btn:hover { border-color: var(--salt); background: var(--salt); color: var(--ink); }

.btn-cyan {
  background: var(--cyan);
  color: var(--ink);
  border-color: var(--cyan);
  font-weight: 500;
}
.btn-cyan:hover {
  background: var(--cyan-2);
  border-color: var(--cyan-2);
  color: var(--ink);
}

.btn-ghost {
  border: none;
  padding-left: 0;
  padding-right: 0;
  color: var(--salt-2);
}
.btn-ghost:hover {
  background: transparent;
  border: none;
  color: var(--salt);
}
.btn-ghost::after {
  content: '→';
  transition: transform 200ms;
}
.btn-ghost:hover::after { transform: translateX(4px); }

/* ============================================
   Hero
   ============================================ */

.hero {
  position: relative;
  min-height: calc(100vh - 70px);
  display: grid;
  grid-template-columns: 1.05fr 1fr;
  gap: 64px;
  padding: 96px var(--site-gutter) 64px;
  max-width: var(--site-maxw);
  margin: 0 auto;
  align-items: center;
}

.hero-grid-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image:
    linear-gradient(to right, var(--hairline) 1px, transparent 1px),
    linear-gradient(to bottom, var(--hairline) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(ellipse 80% 60% at 30% 40%, rgba(0,0,0,0.7), transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse 80% 60% at 30% 40%, rgba(0,0,0,0.7), transparent 75%);
  opacity: 0.6;
}

.hero-content {
  position: relative;
  z-index: 1;
}

.hero h1 {
  font-family: var(--display);
  font-weight: 200;
  font-size: clamp(48px, 6.5vw, 92px);
  letter-spacing: -0.035em;
  line-height: 0.95;
  margin: 24px 0 32px;
  text-wrap: balance;
}
.hero h1 .cyan { color: var(--cyan); }
.hero h1 em {
  font-style: italic;
  font-weight: 300;
  color: var(--salt-2);
}

.hero-lede {
  font-family: var(--display);
  font-weight: 300;
  font-size: 22px;
  line-height: 1.4;
  color: var(--salt-2);
  max-width: 540px;
  margin-bottom: 40px;
  text-wrap: pretty;
}

.hero-cta {
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}

.hero-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
  margin-top: 64px;
  padding-top: 32px;
  border-top: 1px solid var(--hairline);
}
.hero-stat .v {
  font-family: var(--display);
  font-weight: 200;
  font-size: 40px;
  letter-spacing: -0.02em;
  line-height: 1;
}
.hero-stat .v .u {
  font-family: var(--mono);
  font-weight: 400;
  font-size: 12px;
  letter-spacing: 0.06em;
  color: var(--cyan);
  margin-left: 4px;
  vertical-align: 14px;
}
.hero-stat .lbl {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--salt-3);
  margin-top: 10px;
}

.hero-visual {
  position: relative;
  z-index: 1;
  aspect-ratio: 4 / 5;
  background: var(--ink-2);
  border: 1px solid var(--hairline);
  overflow: hidden;
  border-radius: 2px;
}

/* ============================================
   Trust bar
   ============================================ */

.trustbar {
  border-top: 1px solid var(--hairline);
  border-bottom: 1px solid var(--hairline);
  padding: 28px 0;
  background: var(--ink-2);
}
.trustbar-inner {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 48px;
  align-items: center;
  max-width: var(--site-maxw);
  margin: 0 auto;
  padding: 0 var(--site-gutter);
}
.trustbar .label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--salt-3);
}
.trustbar .clients {
  display: flex;
  gap: 48px;
  flex-wrap: wrap;
  align-items: center;
}
.trustbar .clients .client {
  font-family: var(--display);
  font-weight: 400;
  font-size: 18px;
  letter-spacing: -0.01em;
  color: var(--salt-2);
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.trustbar .clients .client::before {
  content: '';
  width: 4px;
  height: 4px;
  background: var(--cyan);
  border-radius: 50%;
  opacity: 0.6;
}

/* ============================================
   Section frame
   ============================================ */

.section {
  position: relative;
  padding: 140px var(--site-gutter);
  border-top: 1px solid var(--hairline);
}
.section.alt { background: var(--ink-2); }
.section.salt {
  background: var(--salt);
  color: var(--ink);
  --salt-2: #3a4049;
  --salt-3: #6b7178;
  --hairline: rgba(5, 8, 12, 0.10);
  --hairline-strong: rgba(5, 8, 12, 0.22);
}
.section.salt .eyebrow {
  color: var(--pacific);
}
.section.salt .eyebrow::before { background: var(--pacific); }

.section-wrap {
  max-width: var(--site-maxw);
  margin: 0 auto;
}

.section-head {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 48px;
  margin-bottom: 80px;
  align-items: baseline;
}
.section-num {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--salt-3);
}

.section-title {
  font-family: var(--display);
  font-weight: 200;
  font-size: clamp(40px, 5.2vw, 72px);
  letter-spacing: -0.03em;
  line-height: 0.98;
  margin-top: 16px;
  text-wrap: balance;
}
.section-title .cyan { color: var(--cyan); }
.section-title em {
  font-style: italic;
  font-weight: 300;
  color: var(--salt-2);
}

.section-lede {
  font-family: var(--display);
  font-weight: 300;
  font-size: clamp(20px, 2vw, 26px);
  line-height: 1.35;
  color: var(--salt-2);
  max-width: 760px;
  margin-top: 32px;
  text-wrap: pretty;
}

/* ============================================
   The problem (vs/feature compare)
   ============================================ */

.compare {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  border: 1px solid var(--hairline);
}
.compare-col {
  padding: 48px;
  background: var(--ink-2);
}
.compare-col.altio {
  background: var(--ink-3);
  border-left: 1px solid var(--hairline);
}
.compare-col h3 {
  font-family: var(--display);
  font-weight: 400;
  font-size: 22px;
  letter-spacing: -0.01em;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--hairline);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.compare-col.altio h3 { color: var(--cyan); }
.compare-col h3 .tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--salt-3);
  font-weight: 400;
}
.compare-col ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.compare-col li {
  display: grid;
  grid-template-columns: 14px 1fr;
  gap: 14px;
  align-items: baseline;
  font-size: 16px;
  line-height: 1.45;
  color: var(--salt-2);
}
.compare-col li::before {
  content: '×';
  color: var(--salt-3);
  font-family: var(--mono);
  font-weight: 400;
  font-size: 14px;
}
.compare-col.altio li::before {
  content: '→';
  color: var(--cyan);
}
.compare-col.altio li { color: var(--salt); }

/* ============================================
   How it works (3 steps)
   ============================================ */

.steps {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
}
.step {
  background: var(--ink-2);
  border: 1px solid var(--hairline);
  padding: 48px 40px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  min-height: 360px;
  position: relative;
}
.step .step-n {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--cyan);
}
.step .step-icon {
  width: 56px;
  height: 56px;
  margin: 16px 0 8px;
  color: var(--salt);
}
.step .step-photo {
  position: relative;
  margin: 8px -16px 8px;
  aspect-ratio: 16 / 10;
  background: var(--ink);
  border: 1px solid var(--hairline);
  overflow: hidden;
  border-radius: 2px;
}
.step .step-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.step .step-photo-caption {
  position: absolute;
  bottom: 8px;
  left: 10px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--cyan);
  background: rgba(5,8,12,0.75);
  padding: 4px 8px;
  border: 1px solid var(--hairline-strong);
}
.step h3 {
  font-family: var(--display);
  font-weight: 400;
  font-size: 26px;
  letter-spacing: -0.015em;
  line-height: 1.1;
}
.step p {
  color: var(--salt-2);
  font-size: 16px;
  line-height: 1.55;
  text-wrap: pretty;
}
.step .step-detail {
  margin-top: auto;
  padding-top: 20px;
  border-top: 1px solid var(--hairline);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--salt-3);
  line-height: 1.7;
}

/* ============================================
   Services bundle
   ============================================ */

.services-shell {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 80px;
  align-items: start;
}

.svc-summary {
  position: sticky;
  top: 96px;
  padding: 40px;
  background: var(--ink-2);
  border: 1px solid var(--hairline);
}
.svc-summary h3 {
  font-family: var(--display);
  font-weight: 300;
  font-size: 30px;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 16px;
}
.svc-summary p {
  color: var(--salt-2);
  font-size: 15px;
  line-height: 1.55;
  margin-bottom: 28px;
}
.svc-summary .invoice {
  border-top: 1px solid var(--hairline);
  padding-top: 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.svc-summary .invoice .row {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.02em;
  color: var(--salt-3);
}
.svc-summary .invoice .row.total {
  border-top: 1px solid var(--hairline);
  padding-top: 12px;
  margin-top: 4px;
  color: var(--salt);
}
.svc-summary .invoice .row .v { color: var(--salt-2); }
.svc-summary .invoice .row.total .v { color: var(--cyan); }

.svc-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
}
.svc {
  background: var(--ink-2);
  border: 1px solid var(--hairline);
  padding: 36px 32px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: 240px;
  position: relative;
  transition: background 200ms ease;
}
.svc.core {
  background: var(--ink-3);
  border-color: var(--hairline-strong);
}
.svc:hover { background: var(--ink-3); }
.svc-tag {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--cyan);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.svc-tag::before {
  content: '';
  width: 5px;
  height: 5px;
  background: var(--cyan);
  border-radius: 50%;
}
.svc.standard .svc-tag {
  color: var(--salt-3);
}
.svc.standard .svc-tag::before {
  background: var(--salt-3);
}
.svc h4 {
  font-family: var(--display);
  font-weight: 400;
  font-size: 22px;
  letter-spacing: -0.01em;
  line-height: 1.1;
  margin-top: 4px;
}
.svc p {
  color: var(--salt-2);
  font-size: 14px;
  line-height: 1.5;
}
.svc .specs {
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid var(--hairline);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--salt-3);
  text-transform: uppercase;
}

/* ============================================
   Spec wall
   ============================================ */

.spec-wall {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  border: 1px solid var(--hairline);
}
.spec-wall .cell {
  background: var(--ink-2);
  padding: 40px 32px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 240px;
  gap: 24px;
}
.spec-wall .k {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--salt-3);
}
.spec-wall .v {
  font-family: var(--display);
  font-weight: 200;
  font-size: 56px;
  letter-spacing: -0.03em;
  line-height: 0.95;
}
.spec-wall .v .u {
  font-family: var(--mono);
  font-weight: 400;
  font-size: 12px;
  letter-spacing: 0.08em;
  color: var(--cyan);
  vertical-align: 16px;
  margin-left: 4px;
}
.spec-wall .lbl {
  font-size: 13px;
  color: var(--salt-2);
  line-height: 1.45;
}

/* ============================================
   Properties / clients
   ============================================ */

.properties {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
}
.property {
  background: var(--ink-2);
  border: 1px solid var(--hairline);
  aspect-ratio: 4 / 5;
  position: relative;
  overflow: hidden;
}
.property .ph {
  position: absolute;
  inset: 0;
}
.property .meta {
  position: absolute;
  inset: auto 0 0 0;
  padding: 28px;
  background: linear-gradient(180deg, transparent 0%, rgba(5,8,12,0.85) 50%, rgba(5,8,12,0.95) 100%);
  z-index: 2;
}
.property .meta .name {
  font-family: var(--display);
  font-weight: 300;
  font-size: 24px;
  letter-spacing: -0.015em;
  line-height: 1.1;
}
.property .meta .city {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--cyan);
  margin-top: 8px;
}
.property .badge {
  position: absolute;
  top: 20px;
  left: 20px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--salt);
  background: rgba(5,8,12,0.6);
  padding: 5px 10px;
  border: 1px solid var(--hairline-strong);
  z-index: 2;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.property .badge::before {
  content: '';
  width: 4px;
  height: 4px;
  background: var(--cyan);
  border-radius: 50%;
}

/* ============================================
   Process (timeline)
   ============================================ */

.timeline {
  display: grid;
  gap: 1px;
  background: var(--hairline);
}
.timeline-row {
  display: grid;
  grid-template-columns: 100px 1fr 1fr 240px;
  gap: 40px;
  padding: 36px 0;
  background: var(--ink);
  align-items: center;
}
.timeline-row .stamp {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--cyan);
}
.timeline-row .title {
  font-family: var(--display);
  font-weight: 300;
  font-size: 26px;
  letter-spacing: -0.015em;
}
.timeline-row .desc {
  color: var(--salt-2);
  font-size: 15px;
  line-height: 1.55;
}
.timeline-row .when {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--salt-3);
  text-align: right;
}

/* ============================================
   Testimonial
   ============================================ */

.testimonial {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 80px;
  align-items: center;
}
.testimonial-q {
  font-family: var(--display);
  font-weight: 200;
  font-size: clamp(28px, 3.4vw, 44px);
  letter-spacing: -0.025em;
  line-height: 1.15;
  text-wrap: balance;
}
.testimonial-q::before {
  content: '“';
  display: inline;
  color: var(--cyan);
  margin-right: 4px;
}
.testimonial-q::after {
  content: '”';
  color: var(--cyan);
  margin-left: 2px;
}
.testimonial-attr {
  margin-top: 32px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.testimonial-attr .avatar {
  width: 56px;
  height: 56px;
  background: var(--ink-3);
  border: 1px solid var(--hairline-strong);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--display);
  font-weight: 300;
  font-size: 18px;
  color: var(--cyan);
}
.testimonial-attr .who {
  font-family: var(--display);
  font-weight: 400;
  font-size: 16px;
}
.testimonial-attr .title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--salt-3);
  text-transform: uppercase;
  margin-top: 4px;
}

.metrics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  align-self: stretch;
}
.metric {
  background: var(--ink-2);
  border: 1px solid var(--hairline);
  padding: 32px 28px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 200px;
}
.metric .v {
  font-family: var(--display);
  font-weight: 200;
  font-size: 56px;
  letter-spacing: -0.03em;
  line-height: 0.9;
}
.metric .v .u {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--cyan);
  letter-spacing: 0.06em;
  margin-left: 4px;
  vertical-align: 14px;
}
.metric .k {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--salt-3);
}

/* ============================================
   Coverage map
   ============================================ */

.coverage {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 4px;
  border: 1px solid var(--hairline);
}
.coverage-list {
  background: var(--ink-2);
  padding: 40px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.coverage-list h3 {
  font-family: var(--display);
  font-weight: 300;
  font-size: 22px;
  letter-spacing: -0.015em;
  margin-bottom: 24px;
}
.coverage-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--hairline);
  font-size: 15px;
}
.coverage-row:last-child { border-bottom: none; }
.coverage-row .city {
  font-family: var(--display);
  font-weight: 400;
}
.coverage-row .eta {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--cyan);
}
.coverage-map {
  background: var(--ink-3);
  position: relative;
  overflow: hidden;
  min-height: 540px;
}

/* ============================================
   FAQ
   ============================================ */

.faq {
  display: grid;
  gap: 1px;
  background: var(--hairline);
}
.faq-row {
  background: var(--ink);
  border-bottom: 0;
  padding: 32px 0;
  display: grid;
  grid-template-columns: 60px 1fr 24px;
  gap: 32px;
  cursor: pointer;
  transition: background 160ms;
}
.faq-row:hover { background: var(--ink-2); padding-left: 16px; padding-right: 16px; }
.faq-q {
  font-family: var(--display);
  font-weight: 400;
  font-size: 22px;
  letter-spacing: -0.015em;
}
.faq-n {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--cyan);
  padding-top: 6px;
}
.faq-a {
  grid-column: 2;
  margin-top: 16px;
  color: var(--salt-2);
  font-size: 16px;
  line-height: 1.55;
  max-width: 820px;
  text-wrap: pretty;
  display: none;
}
.faq-row.is-open .faq-a { display: block; }
.faq-toggle {
  font-family: var(--mono);
  font-size: 20px;
  color: var(--salt-3);
  padding-top: 2px;
  transition: transform 200ms;
}
.faq-row.is-open .faq-toggle { transform: rotate(45deg); color: var(--cyan); }

/* ============================================
   CTA / final
   ============================================ */

.cta-section {
  background: var(--cyan);
  color: var(--ink);
  padding: 120px var(--site-gutter);
  position: relative;
  overflow: hidden;
}
.cta-section::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(to right, rgba(5,8,12,0.06) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(5,8,12,0.06) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(ellipse at 80% 50%, rgba(0,0,0,0.6), transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse at 80% 50%, rgba(0,0,0,0.6), transparent 70%);
  pointer-events: none;
}
.cta-inner {
  max-width: var(--site-maxw);
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 64px;
  align-items: center;
  position: relative;
  z-index: 1;
}
.cta-inner .eyebrow { color: rgba(5,8,12,0.7); }
.cta-inner .eyebrow::before { background: rgba(5,8,12,0.7); }
.cta-section h2 {
  font-family: var(--display);
  font-weight: 200;
  font-size: clamp(40px, 5vw, 72px);
  letter-spacing: -0.03em;
  line-height: 0.98;
  margin: 20px 0 28px;
  text-wrap: balance;
}
.cta-section h2 em {
  font-style: italic;
  font-weight: 300;
  color: rgba(5,8,12,0.7);
}
.cta-section p {
  font-family: var(--display);
  font-weight: 300;
  font-size: 22px;
  line-height: 1.35;
  color: rgba(5,8,12,0.78);
  max-width: 540px;
}
.cta-form {
  background: var(--ink);
  color: var(--salt);
  padding: 36px;
  border-radius: 2px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.cta-form .hd {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 8px;
}
.cta-form label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--salt-3);
}
.cta-form input,
.cta-form select {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--hairline-strong);
  color: var(--salt);
  font-family: var(--display);
  font-weight: 300;
  font-size: 16px;
  padding: 10px 0;
  outline: none;
  appearance: none;
}
.cta-form input:focus,
.cta-form select:focus {
  border-bottom-color: var(--cyan);
}
.cta-form input::placeholder { color: var(--salt-3); }
.cta-form .field { display: flex; flex-direction: column; gap: 4px; }
.cta-form .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.cta-form .submit {
  margin-top: 16px;
  background: var(--cyan);
  color: var(--ink);
  border: none;
  padding: 16px 24px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 500;
  cursor: pointer;
  transition: background 200ms;
  border-radius: 2px;
}
.cta-form .submit:hover { background: var(--cyan-2); }
.cta-form .fine {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--salt-3);
  text-transform: uppercase;
  text-align: center;
  margin-top: 4px;
}

/* ============================================
   Footer
   ============================================ */

.footer {
  background: var(--ink);
  color: var(--salt);
  padding: 96px var(--site-gutter) 32px;
  border-top: 1px solid var(--hairline);
}
.footer-inner {
  max-width: var(--site-maxw);
  margin: 0 auto;
}
.footer-top {
  display: grid;
  grid-template-columns: 1.6fr 1fr 1fr 1fr;
  gap: 64px;
  padding-bottom: 64px;
  border-bottom: 1px solid var(--hairline);
}
.footer-col h5 {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--salt-3);
  margin-bottom: 20px;
}
.footer-col ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 14px;
  font-size: 15px;
}
.footer-col a { color: var(--salt-2); transition: color 160ms; }
.footer-col a:hover { color: var(--salt); }
.footer-brand p {
  color: var(--salt-2);
  font-size: 15px;
  line-height: 1.55;
  max-width: 360px;
  margin-top: 20px;
}
.footer-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 32px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--salt-3);
}
.footer-bottom .legal { display: flex; gap: 24px; }

/* ============================================
   Photo placeholder graphics
   ============================================ */

.ph-arch {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(5,8,12,0.3), rgba(5,8,12,0.1) 30%, rgba(5,8,12,0.4) 70%, rgba(5,8,12,0.85)),
    linear-gradient(135deg, #1a2230 0%, #0c1018 100%);
  position: absolute;
}

/* ============================================
   In-action band — full-bleed proof shot
   ============================================ */

.in-action-band {
  position: relative;
  width: 100%;
  aspect-ratio: 21 / 9;
  background: var(--ink-3);
  border-top: 1px solid var(--hairline);
  border-bottom: 1px solid var(--hairline);
  overflow: hidden;
  isolation: isolate;
}
.in-action-band img,
.in-action-band video,
.in-action-band iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  border: 0;
  filter: contrast(1.04) saturate(0.92);
}
.in-action-band iframe {
  /* iframe content fills via cover-like trick */
  pointer-events: none;
}
.in-action-band .in-action-still { z-index: 0; }
.in-action-band .in-action-video {
  z-index: 1;
  background: transparent;
  opacity: 0;
  transition: opacity 320ms ease;
}
.in-action-band .in-action-video.is-ready { opacity: 1; }
.in-action-overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(5,8,12,0.55) 0%, rgba(5,8,12,0) 22%, rgba(5,8,12,0) 60%, rgba(5,8,12,0.85) 100%),
    linear-gradient(90deg, rgba(5,8,12,0.45) 0%, rgba(5,8,12,0) 30%);
  pointer-events: none;
}
.in-action-meta {
  position: absolute;
  inset: auto 0 0 0;
  padding: 28px 40px;
  display: flex;
  justify-content: space-between;
  align-items: end;
  gap: 32px;
  z-index: 2;
}
.in-action-meta-l {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--salt);
  display: flex;
  align-items: center;
  gap: 12px;
}
.in-action-meta-l .dot {
  width: 8px;
  height: 8px;
  background: var(--cyan);
  border-radius: 50%;
  box-shadow: 0 0 0 4px rgba(61, 140, 255, 0.18);
  animation: in-action-pulse 2200ms ease-in-out infinite;
}
@keyframes in-action-pulse {
  0%, 100% { box-shadow: 0 0 0 4px rgba(61, 140, 255, 0.18); }
  50% { box-shadow: 0 0 0 9px rgba(61, 140, 255, 0.04); }
}
.in-action-meta-r {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--salt-2);
}
.in-action-corners {
  position: absolute;
  inset: 24px 40px auto 40px;
  display: flex;
  justify-content: space-between;
  z-index: 2;
  pointer-events: none;
}
.in-action-corners .c {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--cyan);
  background: rgba(5,8,12,0.55);
  padding: 5px 10px;
  border: 1px solid rgba(61, 140, 255, 0.30);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  white-space: nowrap;
}
.in-action-corners .tr { color: var(--salt-2); border-color: var(--hairline-strong); }

@media (max-width: 768px) {
  .in-action-band { aspect-ratio: 4 / 3; }
  .in-action-meta { padding: 16px 20px; flex-direction: column; align-items: flex-start; gap: 8px; }
  .in-action-meta-l { font-size: 10px; }
  .in-action-corners { inset: 16px 20px auto 20px; }
  .in-action-corners .c { font-size: 9px; padding: 4px 8px; }
}

/* ============================================
   Nav hamburger + drawer (base — hidden on desktop)
   ============================================ */

.nav-burger {
  display: none;
  appearance: none;
  background: transparent;
  border: 1px solid var(--hairline-strong);
  border-radius: 2px;
  width: 40px;
  height: 40px;
  padding: 0;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  transition: border-color 160ms ease;
}
.nav-burger:hover { border-color: var(--salt); }
.nav-burger span {
  display: block;
  width: 18px;
  height: 1.5px;
  background: var(--salt);
  transition: transform 240ms ease, opacity 240ms ease;
}
.nav.is-open .nav-burger span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav.is-open .nav-burger span:nth-child(2) { opacity: 0; }
.nav.is-open .nav-burger span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

.nav-drawer {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--ink);
  border-bottom: 1px solid var(--hairline-strong);
  display: none;
  flex-direction: column;
  padding: 24px var(--site-gutter) 32px;
  gap: 4px;
  font-family: var(--mono);
  font-size: 14px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--salt);
}
.nav-drawer a {
  padding: 18px 0;
  border-bottom: 1px solid var(--hairline);
  color: var(--salt);
}
.nav-drawer a:last-of-type { border-bottom: none; }
.nav-drawer .nav-drawer-foot {
  display: flex;
  flex-direction: column;
  gap: 16px;

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel">/* ============================================
   ALTIO — Marks Library
   Wordmark + monograms + icons, all drawn from
   geometric primitives so they stay crisp at any
   size and the brand is mathematically consistent.
   ============================================ */

// --- Core construction values ---
// All letters built on a 160-unit cap height, 20-unit stroke.
// Wordmark viewBox: 0 0 690 160 (letters across)
// Spacing reflects the source: generous, geometric, even.

const Wordmark = ({
  weight = 20,
  color = 'currentColor',
  className = '',
  style = {},
  showConstruction = false,
  tagline = false,
  taglineColor = 'var(--cyan)',
  ariaLabel = 'Altio',
}) => {
  const h = tagline ? 240 : 160;
  return (
    <svg
      viewBox={`0 0 690 ${h}`}
      className={className}
      style={{ width: '100%', height: 'auto', display: 'block', ...style }}
      aria-label={ariaLabel}
      role="img"
    >
      {showConstruction && (
        <g opacity="0.35" stroke="var(--cyan)" strokeWidth="0.5" fill="none">
          {/* Cap height + baseline */}
          <line x1="0" y1="10" x2="690" y2="10" strokeDasharray="2 3" />
          <line x1="0" y1="150" x2="690" y2="150" strokeDasharray="2 3" />
          <line x1="0" y1="80" x2="690" y2="80" strokeDasharray="2 3" />
          {/* O circle guide */}
          <circle cx="610" cy="80" r="70" />
          <circle cx="610" cy="80" r="2" fill="var(--cyan)" />
          {/* Letter origins */}
          {[20, 210, 405, 500, 610].map((x, i) => (
            <line key={i} x1={x} y1="-6" x2={x} y2="166" strokeDasharray="2 3" />
          ))}
        </g>
      )}
      <g
        stroke={color}
        strokeWidth={weight}
        fill="none"
        strokeLinecap="square"
        strokeLinejoin="miter"
      >
        {/* A — peak, no crossbar */}
        <polyline points="20,150 90,10 160,150" />
        {/* L */}
        <polyline points="210,10 210,150 310,150" />
        {/* T */}
        <line x1="350" y1="10" x2="460" y2="10" />
        <line x1="405" y1="10" x2="405" y2="150" />
        {/* I */}
        <line x1="500" y1="10" x2="500" y2="150" />
        {/* O — perfect circle (aperture) */}
        <circle cx="610" cy="80" r="70" />
      </g>
      {tagline && (
        <text
          x="22"
          y="210"
          fill={taglineColor}
          style={{
            fontFamily: 'Geist, system-ui, sans-serif',
            fontSize: 22,
            fontWeight: 400,
            letterSpacing: '0.02em',
          }}
        >
          Autonomous Exterior Maintenance
        </text>
      )}
    </svg>
  );
};

// --- Peak monogram — the A (altitude / summit) ---
const PeakMark = ({ weight = 24, color = 'currentColor', className = '', style = {} }) => (
  <svg
    viewBox="0 0 160 160"
    className={className}
    style={{ width: '100%', height: 'auto', display: 'block', ...style }}
    role="img"
    aria-label="Altio Peak"
  >
    <polyline
      points="10,150 80,10 150,150"
      stroke={color}
      strokeWidth={weight}
      fill="none"
      strokeLinecap="square"
      strokeLinejoin="miter"
    />
  </svg>
);

// --- Aperture monogram — the O (drone disc / clean lens) ---
const ApertureMark = ({ weight = 24, color = 'currentColor', className = '', style = {} }) => (
  <svg
    viewBox="0 0 160 160"
    className={className}
    style={{ width: '100%', height: 'auto', display: 'block', ...style }}
    role="img"
    aria-label="Altio Aperture"
  >
    <circle
      cx="80"
      cy="80"
      r="68"
      stroke={color}
      strokeWidth={weight}
      fill="none"
    />
  </svg>
);

// --- Stacked badge — Peak nested in Aperture, vertical mark ---
const BadgeMark = ({ color = 'currentColor', className = '', style = {} }) => (
  <svg
    viewBox="0 0 160 160"
    className={className}
    style={{ width: '100%', height: 'auto', display: 'block', ...style }}
    role="img"
    aria-label="Altio Badge"
  >
    <circle cx="80" cy="80" r="72" stroke={color} strokeWidth="6" fill="none" />
    <polyline
      points="42,110 80,46 118,110"
      stroke={color}
      strokeWidth="8"
      fill="none"
      strokeLinecap="square"
      strokeLinejoin="miter"
    />
  </svg>
);

// --- Drone (Sherpa — top-down coaxial octocopter, 4 arms × 2 stacked rotors) ---
const DroneIcon = ({ color = 'currentColor', className = '', style = {} }) => (
  <svg
    viewBox="0 0 120 120"
    className={className}
    style={{ width: '100%', height: 'auto', display: 'block', ...style }}
    fill="none"
    stroke={color}
    strokeWidth="2.5"
    strokeLinecap="round"
    strokeLinejoin="round"
  >
    {/* Diagonal arms — corner-to-corner through the hub */}
    <line x1="22" y1="22" x2="98" y2="98" />
    <line x1="98" y1="22" x2="22" y2="98" />

    {/* Central hub — hexagonal frame */}
    <polygon points="60,42 76,51 76,69 60,78 44,69 44,51" fill={color === 'currentColor' ? 'rgba(0,0,0,0.4)' : color} fillOpacity="0.08" />
    {/* Center crosshair */}
    <circle cx="60" cy="60" r="3" fill={color} stroke="none" />

    {/* Payload hanging below hub (pressure-wash kit) */}
    <line x1="60" y1="78" x2="60" y2="86" />
    <rect x="54" y="86" width="12" height="6" rx="1" />

    {/* Rotors — coaxial pairs (outer + inner ring on each arm tip) */}
    {[
      [22, 22], [98, 22], [22, 98], [98, 98]
    ].map(([cx, cy], i) => (
      <g key={i}>
        <circle cx={cx} cy={cy} r="13" />
        <circle cx={cx} cy={cy} r="9" strokeWidth="1" opacity="0.55" />
        {/* motor stub */}
        <circle cx={cx} cy={cy} r="2" fill={color} stroke="none" />
      </g>
    ))}
  </svg>
);

// --- Lavo Bot (ground robot — top-down view, mecanum-wheeled cleaner) ---
const LavoBotIcon = ({ color = 'currentColor', className = '', style = {} }) => (
  <svg
    viewBox="0 0 120 120"
    className={className}
    style={{ width: '100%', height: 'auto', display: 'block', ...style }}
    fill="none"
    stroke={color}
    strokeWidth="2.5"
    strokeLinecap="square"
    strokeLinejoin="miter"
  >
    {/* Chassis */}
    <rect x="22" y="22" width="76" height="76" rx="3" />
    {/* Inner deck panel */}
    <rect x="30" y="30" width="60" height="60" rx="2" strokeWidth="1" opacity="0.45" />
    {/* Sensor / camera turret */}
    <circle cx="60" cy="44" r="6" />
    <circle cx="60" cy="44" r="2" fill={color} stroke="none" />
    {/* Lidar arc / scan indicator */}
    <path d="M 46 36 A 18 18 0 0 1 74 36" strokeWidth="1" strokeDasharray="2 3" opacity="0.55" />

    {/* Mecanum wheels — 4 corners, with diagonal roller hints */}
    {[
      [22, 30, 0], [98, 30, 0], [22, 90, 0], [98, 90, 0]
    ].map(([cx, cy], i) => (
      <g key={i}>
        <rect x={cx - 9} y={cy - 5} width="18" height="10" strokeWidth="2" />
        <line x1={cx - 6} y1={cy - 3} x2={cx} y2={cy + 3} strokeWidth="0.8" opacity="0.6" />
        <line x1={cx} y1={cy - 3} x2={cx + 6} y2={cy + 3} strokeWidth="0.8" opacity="0.6" />
      </g>
    ))}

    {/* Cleaning brush band underneath (suggested by horizontal line) */}
    <line x1="32" y1="76" x2="88" y2="76" strokeWidth="1.5" opacity="0.55" strokeDasharray="3 2" />
  </svg>
);

// --- Building (simple architectural form) ---
const BuildingIcon = ({ color = 'currentColor', className = '', style = {} }) => (
  <svg
    viewBox="0 0 120 120"
    className={className}
    style={{ width: '100%', height: 'auto', display: 'block', ...style }}
    fill="none"
    stroke={color}
    strokeWidth="2.5"
  >
    <rect x="20" y="14" width="80" height="92" />
    {[28, 44, 60, 76, 92].map(y => (
      <line key={y} x1="20" y1={y} x2="100" y2={y} />
    ))}
    {[40, 60, 80].map(x => (
      <line key={x} x1={x} y1="14" x2={x} y2="106" />
    ))}
  </svg>
);

// --- Sweep (spray fan from a point) ---
const SweepIcon = ({ color = 'currentColor', className = '', style = {} }) => (
  <svg
    viewBox="0 0 120 120"
    className={className}
    style={{ width: '100%', height: 'auto', display: 'block', ...style }}
    fill="none"
    stroke={color}
    strokeWidth="2.5"
    strokeLinecap="square"
  >
    <circle cx="60" cy="20" r="6" />
    {[-30, -15, 0, 15, 30].map((deg, i) => {
      const rad = (deg * Math.PI) / 180;
      const x = 60 + Math.sin(rad) * 90;
      const y = 20 + Math.cos(rad) * 90;
      return <line key={i} x1="60" y1="26" x2={x} y2={y} strokeDasharray="2 4" />;
    })}
  </svg>
);

// --- Path arrow (drone flight vector) ---
const PathIcon = ({ color = 'currentColor', className = '', style = {} }) => (
  <svg
    viewBox="0 0 120 120"
    className={className}
    style={{ width: '100%', height: 'auto', display: 'block', ...style }}
    fill="none"
    stroke={color}
    strokeWidth="2.5"
    strokeLinecap="square"
  >
    <path d="M 10 90 Q 40 90, 50 60 T 90 30" strokeDasharray="3 4" />
    <polyline points="78,22 96,28 90,42" />
  </svg>
);

// --- Drone path overlay pattern (used in pattern section + drone livery) ---
const DronePathPattern = ({ color = 'currentColor', dense = false, className = '', style = {} }) => {
  const lines = [];
  const step = dense ? 18 : 28;
  for (let y = 0; y < 240; y += step) {
    lines.push(
      <line key={`h-${y}`} x1="0" y1={y} x2="240" y2={y} stroke={color} strokeWidth="0.6" opacity="0.4" />
    );
  }
  return (
    <svg
      viewBox="0 0 240 240"
      preserveAspectRatio="xMidYMid slice"
      className={className}
      style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', ...style }}
    >
      {lines}
      <path
        d="M 10 220 Q 60 220, 80 160 T 120 90 Q 130 50, 180 30"
        stroke={color}
        strokeWidth="1.5"
        fill="none"
        opacity="0.9"
        strokeDasharray="4 4"
      />
      <circle cx="180" cy="30" r="3" fill={color} />
      <circle cx="10" cy="220" r="2" fill={color} opacity="0.6" />
    </svg>
  );
};

// --- Dot grid (clean surface metaphor / scan pattern) ---
const DotGrid = ({ color = 'currentColor', size = 240, gap = 16, className = '', style = {} }) => {
  const dots = [];
  for (let y = gap; y < size; y += gap) {
    for (let x = gap; x < size; x += gap) {
      dots.push(<circle key={`${x}-${y}`} cx={x} cy={y} r="1" fill={color} opacity="0.4" />);
    }
  }
  return (
    <svg
      viewBox={`0 0 ${size} ${size}`}
      preserveAspectRatio="xMidYMid slice"
      className={className}
      style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', ...style }}
    >
      {dots}
    </svg>
  );
};

// --- Coastline scan (horizon line + repeating verticals) ---
const CoastScan = ({ color = 'currentColor', className = '', style = {} }) => (
  <svg
    viewBox="0 0 240 240"
    preserveAspectRatio="xMidYMid slice"
    className={className}
    style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', ...style }}
  >
    {[...Array(48)].map((_, i) => {
      const x = i * 5 + 2;
      const h = 30 + (Math.sin(i * 0.45) + 1) * 35;
      return (
        <line key={i} x1={x} y1={120} x2={x} y2={120 - h} stroke={color} strokeWidth="1" opacity="0.6" />
      );
    })}
    <line x1="0" y1="120" x2="240" y2="120" stroke={color} strokeWidth="1" />
    {[140, 160, 180, 200].map((y, i) => (
      <line key={y} x1="0" y1={y} x2="240" y2={y} stroke={color} strokeWidth="0.5" opacity={0.5 - i * 0.1} />
    ))}
  </svg>
);

Object.assign(window, {
  Wordmark,
  PeakMark,
  ApertureMark,
  BadgeMark,
  DroneIcon,
  LavoBotIcon,
  BuildingIcon,
  SweepIcon,
  PathIcon,
  DronePathPattern,
  DotGrid,
  CoastScan,
});
</script>
  <script type="text/babel">/* ============================================
   ALTIO SITE — Nav + Hero + Services
   ============================================ */

const { useState: useS1, useEffect: useE1, useRef: useR1 } = React;

// --------- Nav ---------
const Nav = () => {
  const [scrolled, setScrolled] = useS1(false);
  const [menuOpen, setMenuOpen] = useS1(false);
  useE1(() => {
    const onScroll = () => setScrolled(window.scrollY > 12);
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  useE1(() => {
    document.body.style.overflow = menuOpen ? 'hidden' : '';

  }, [menuOpen]);

  const closeMenu = () => setMenuOpen(false);

  return (
    <header className={'nav' + (scrolled ? ' is-scrolled' : '') + (menuOpen ? ' is-open' : '')}>
      <div className="nav-inner">
        <a href="#top" className="nav-mark" aria-label="Altio — home" onClick={closeMenu}>

        <a href="#faq" onClick={closeMenu}>FAQ</a>

          <a href="#survey" className="btn btn-cyan" onClick={closeMenu}>Request a Survey →</a>
        </div>
      </div>
    </header>
  );
};

// --------- Hero ---------
const Hero = () => (
  <section className="hero" id="top">

          { v: '15K', u: 'SQ FT / HR', lbl: 'Coverage rate' },

          { v: '3×', u: 'FASTER', lbl: 'Versus manual' },
        ].slice(0, 3).map((s) => (
          <div key={s.lbl} className="hero-stat">

// Hero visual — Cybertruck hero photo with operations-overlay corners
const HeroVisual = () => (

// --------- CTA / survey form ---------
const SurveyCTA = () => {
  const [status, setStatus] = React.useState('idle'); // idle | submitting | success | error
  const [errorMsg, setErrorMsg] = React.useState('');
  const [ref, setRef] = React.useState('');

  const onSubmit = async (e) => {
    e.preventDefault();
    if (status === 'submitting') return;
    const form = e.target;
    const data = new FormData(form);

    // Honeypot — bots fill every field; real users skip the hidden one
    if (data.get('_gotcha')) {
      setStatus('success'); // pretend success, drop silently
      return;
    }

    // Friendly subject line in your inbox
    data.set('_subject', `New survey request — ${data.get('property') || 'unspecified property'}`);

    setStatus('submitting');
    setErrorMsg('');
    try {
      const r = await fetch('https://formspree.io/f/mgoqodwb', {
        method: 'POST',
        body: data,
        headers: { Accept: 'application/json' },
      });
      if (r.ok) {
        setRef(`PRPR-${new Date().getFullYear()}-${Math.floor(Math.random() * 9000 + 1000)}`);
        setStatus('success');
        form.reset();
      } else {
        const j = await r.json().catch(() => ({}));
        const msg = (j.errors && j.errors[0]?.message) || `Submit failed (${r.status})`;
        setErrorMsg(msg);
        setStatus('error');
      }
    } catch (err) {
      setErrorMsg('Network error — check your connection and try again.');
      setStatus('error');
    }
  };

  return (
    <section className="cta-section" id="survey">
      <div className="cta-inner">
        <div>
          <span className="eyebrow">Request a survey</span>
          <h2>
            See what your facade<br />
            <em>actually looks like.</em>
          </h2>
          <p>
            Tell us about the property. We send a Sherpa for a no-cost survey flight, return a photo report, and quote a standing-service cycle. Two minutes to fill out. Zero obligation.
          </p>
          <div style={{ marginTop: 40, display: 'flex', gap: 32, flexWrap: 'wrap', fontFamily: 'var(--mono)', fontSize: 11, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'rgba(5,8,12,0.7)' }}>
            <span>● Licensed</span>
            <span>● Insured</span>
            <span>● FAA Part 107 Certified</span>
          </div>
        </div>

        <form className="cta-form" onSubmit={onSubmit} noValidate>
          {status !== 'success' ? (
            <>
              <div className="hd">Survey request · PRPR-{new Date().getFullYear()}</div>

              {/* Honeypot — hidden from humans, catches bots */}
              <div style={{ position: 'absolute', left: '-9999px', width: 1, height: 1, overflow: 'hidden' }} aria-hidden="true">
                <label>Don't fill this out: <input type="text" name="_gotcha" tabIndex="-1" autoComplete="off" /></label>
              </div>

              <div className="field">
                <label htmlFor="f-name">Your name</label>
                <input id="f-name" type="text" name="name" placeholder="Elena Vasquez" required />
              </div>
              <div className="field">
                <label htmlFor="f-email">Email</label>
                <input id="f-email" type="email" name="email" placeholder="e.vasquez@maison27.com" required />
              </div>
              <div className="field">
                <label htmlFor="f-property">Property name</label>
                <input id="f-property" type="text" name="property" placeholder="Maison 27" required />
              </div>
              <div className="row">
                <div className="field">
                  <label htmlFor="f-type">Property type</label>
                  <select id="f-type" name="propertyType" required defaultValue="">
                    <option value="" disabled>Select…</option>
                    <option>Beachfront hotel</option>
                    <option>Luxury HOA</option>
                    <option>Commercial office</option>
                    <option>High-rise condo</option>
                    <option>Other</option>
                  </select>
                </div>
                <div className="field">
                  <label htmlFor="f-city">City</label>
                  <select id="f-city" name="city" required defaultValue="">
                    <option value="" disabled>Select…</option>
                    <option>Santa Monica</option>
                    <option>Venice</option>
                    <option>Brentwood</option>
                    <option>West Hollywood</option>
                    <option>Beverly Hills</option>
                    <option>Other Westside</option>
                  </select>
                </div>
              </div>
              <div className="field">
                <label htmlFor="f-notes">Anything else?</label>
                <input id="f-notes" type="text" name="notes" placeholder="Approx. sq ft, services of interest…" />
              </div>

              <button type="submit" className="submit" disabled={status === 'submitting'}>
                {status === 'submitting' ? 'Sending…' : 'Send request →'}
              </button>

              {status === 'error' && (
                <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.10em', color: 'var(--signal)', textTransform: 'uppercase', textAlign: 'center', marginTop: 8 }}>
                  {errorMsg}
                </div>
              )}

              <div className="fine">Response within one business day · Santa Monica HQ</div>
            </>
          ) : (
            <div style={{ textAlign: 'center', padding: '48px 0' }}>
              <div className="hd" style={{ marginBottom: 24 }}>Survey received</div>
              <div style={{ fontFamily: 'var(--display)', fontWeight: 300, fontSize: 24, letterSpacing: '-0.02em', color: 'var(--salt)', lineHeight: 1.2, marginBottom: 16 }}>
                Thanks. We'll be in touch within one business day.
              </div>
              <div style={{ fontFamily: 'var(--mono)', fontSize: 11, letterSpacing: '0.14em', color: 'var(--salt-3)', textTransform: 'uppercase' }}>
                Reference · {ref}
              </div>
            </div>
          )}
        </form>
      </div>
    </section>
  );
};
